<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:5px;
text-align:center;
}

input{
width:200px;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#febd69;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>
function login(){
let email=document.getElementById("email").value
let password=document.getElementById("password").value

if(email=="" || password==""){
document.getElementById("msg").innerHTML="Enter Email and Password"
}else{
window.location.href="products.html"
}
}
</script>

</body>
</html>
